<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Snake Game</title>
</head>

<body>
    <main>
        <section>
            <div class="infos">
                <div class="info highscore">High Score:<span> 00</span></div>
                <div class="info score">Score :<span> 0</span></div>
                <div class="info time">Time :<span> 00:00</span></div>
            </div>
            <div class="board">
            </div>
        </section>
        <div class="modal">
            <div class="startGame">
                <h2>Welcome to Snake Game</h2>
                <button class="btn btn-start">Start Game</button>
            </div>
            <div class="endGame">
                <h2>Welcome to Snake Game</h2>
                <button class="btn btn-restart">Restart Game</button>

            </div>

        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
